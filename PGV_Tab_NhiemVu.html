<script>
let mbcMo = false;
let cotETonTai = false; // Biến để kiểm tra xem có cột E hay không
let giaTriCotE = ""; // Lưu giá trị cột E (xx)
let giaoVienDangChon = null; // Lưu giáo viên đang được chọn
let taiKhoanHienTai = null; // Lưu tài khoản đang đăng nhập

// Hàm kiểm tra quyền truy cập dựa trên dropdown giáo viên
function kiemTraQuyenTruyCap() {
    var selectGv = document.getElementById("hopChonGv");
    var nutLuu = document.querySelector('button[onclick="xulyLuuTam()"]');
    var nutNop = document.getElementById("nutNopBcao");
    
    if (cotETonTai && selectGv && selectGv.style.display !== "none") {
        var giaTriDuocChon = selectGv.value;
        var tenGvDuocChon = selectGv.options[selectGv.selectedIndex]?.text || "";
        
        if (giaTriDuocChon && giaTriDuocChon !== "") {
            // Đã chọn giáo viên -> vô hiệu hóa nút lưu và nộp báo cáo
            if (nutLuu) nutLuu.disabled = true;
            if (nutNop) nutNop.disabled = true;
            
            // Lưu giáo viên đang được chọn
            giaoVienDangChon = { id: giaTriDuocChon, ten: tenGvDuocChon };
            
            // Hiển thị thông báo nếu cần
            if (typeof hienThongb === 'function') {
                hienThongb('chuy', `⚠️ Bạn đang xem nhật ký của giáo viên: ${tenGvDuocChon}. Chỉ giáo viên đó mới được lưu và nộp báo cáo.`);
            }
            
            // Gọi hàm tải dữ liệu của giáo viên được chọn (nếu có)
            taiDuLieuGiaoVien(giaTriDuocChon);
        } else {
            // Chưa chọn giáo viên hoặc chọn mặc định
            giaoVienDangChon = null;
            
            // Kiểm tra quyền của tài khoản hiện tại
            if (window.PGV_IS_SELF === true || window.PGV_QUYEN === 'xxx') {
                if (nutLuu) nutLuu.disabled = false;
                if (nutNop && mbcMo) nutNop.disabled = false;
            } else {
                if (nutLuu) nutLuu.disabled = true;
                if (nutNop) nutNop.disabled = true;
            }
        }
    } else {
        // Không có cột E, kích hoạt bình thường
        giaoVienDangChon = null;
        if (window.PGV_IS_SELF === true || window.PGV_QUYEN === 'xxx') {
            if (nutLuu) nutLuu.disabled = false;
            if (nutNop && mbcMo) nutNop.disabled = false;
        }
    }
}

// Hàm tải dữ liệu của giáo viên được chọn
function taiDuLieuGiaoVien(maGiaoVien) {
    if (!maGiaoVien) return;
    
    if (typeof hienTaiDl === 'function') {
        hienTaiDl(`📋 Đang tải dữ liệu của giáo viên...`);
    }
    
    // Gọi API để tải dữ liệu của giáo viên được chọn
    // Giả sử có API: khachApi.layDuLieuGiaoVien
    if (typeof khachApi !== 'undefined' && typeof khachApi.layDuLieuGiaoVien === 'function') {
        khachApi.layDuLieuGiaoVien({ maGv: maGiaoVien }, function(kq) {
            if (typeof anTaiDl === 'function') anTaiDl();
            if (kq && kq.ttai === 'tcong' && kq.dulieu) {
                // Cập nhật giao diện với dữ liệu của giáo viên
                capNhatGiaoDienTheoGiaoVien(kq.dulieu);
                if (typeof hienThongb === 'function') {
                    hienThongb('tcong', `Đã tải dữ liệu của giáo viên thành công!`);
                }
            } else {
                if (typeof hienThongb === 'function') {
                    hienThongb('loi', `Không thể tải dữ liệu: ${kq?.tbao || 'Lỗi không xác định'}`);
                }
            }
        }, function(loi) {
            if (typeof anTaiDl === 'function') anTaiDl();
            if (typeof hienThongb === 'function') {
                hienThongb('loi', `Lỗi tải dữ liệu: ${loi.message}`);
            }
        });
    } else {
        if (typeof anTaiDl === 'function') anTaiDl();
        // Nếu không có API, hiển thị thông báo demo
        if (typeof hienThongb === 'function') {
            hienThongb('chuy', `Đã chọn giáo viên: ${maGiaoVien}. Dữ liệu sẽ được tải khi tích hợp API.`);
        }
    }
}

// Hàm cập nhật giao diện theo dữ liệu của giáo viên được chọn
function capNhatGiaoDienTheoGiaoVien(dulieu) {
    if (!dulieu) return;
    
    // Cập nhật bảng nhiệm vụ
    if (dulieu.bangNhiemVu && typeof veBangNviec === 'function') {
        veBangNviec(dulieu.bangNhiemVu);
    }
    
    // Cập nhật các trường thông tin khác
    if (dulieu.soNgayNghi !== undefined) {
        $('#nhapSngayNghi').val(dulieu.soNgayNghi);
    }
    if (dulieu.lyDoNghi !== undefined) {
        $('#nhapLdoNghi').val(dulieu.lyDoNghi);
        if (typeof gdang === 'function') gdang(document.getElementById('nhapLdoNghi'));
    }
    if (dulieu.yKien !== undefined) {
        $('#nhapYkien').val(dulieu.yKien);
        if (typeof gdang === 'function') gdang(document.getElementById('nhapYkien'));
    }
    if (dulieu.baoCao !== undefined) {
        $('#nhapBcao').val(dulieu.baoCao);
        if (typeof gdang === 'function') gdang(document.getElementById('nhapBcao'));
    }
    if (dulieu.diemThuong !== undefined) {
        $('#nhapDiemThuong').val(dulieu.diemThuong);
    }
    
    // Cập nhật file đính kèm nếu có
    if (dulieu.dinhKem && Array.isArray(dulieu.dinhKem)) {
        window.tepdinhkBcao = dulieu.dinhKem;
        if (typeof veDinhKemBcao === 'function') veDinhKemBcao();
    }
    
    // Tính lại điểm
    if (typeof tinhtTdong === 'function') tinhtTdong();
}

// Hàm khởi tạo dropdown giáo viên khi có cột E
function khoiTaoDropdownGiaoVien(danhSachGiaoVien, taiKhoanHienTaiId = null) {
    var selectGv = document.getElementById("hopChonGv");
    if (!selectGv) return;
    
    // Lưu tài khoản hiện tại
    taiKhoanHienTai = taiKhoanHienTaiId;
    
    // Xóa các option cũ
    selectGv.innerHTML = '<option value="">-- Lựa chọn giáo viên --</option>';
    
    // Thêm danh sách giáo viên
    if (danhSachGiaoVien && danhSachGiaoVien.length > 0) {
        danhSachGiaoVien.forEach(function(gv) {
            var option = document.createElement("option");
            option.value = gv.id || gv.ma;
            option.textContent = gv.ten || gv.hoTen;
            // Nếu giáo viên này là tài khoản đang đăng nhập, có thể đánh dấu
            if ((gv.id === taiKhoanHienTai || gv.ma === taiKhoanHienTai) && taiKhoanHienTai) {
                option.setAttribute('data-is-self', 'true');
            }
            selectGv.appendChild(option);
        });
        selectGv.style.display = "inline-block";
        selectGv.disabled = false;
    } else {
        selectGv.style.display = "none";
        selectGv.disabled = true;
    }
}

// Hàm xử lý khi tải dữ liệu và phát hiện cột E = (xx)
function xuLyCotE(giaTriE, danhSachGiaoVien, taiKhoanHienTaiId = null) {
    cotETonTai = true;
    giaTriCotE = giaTriE;
    taiKhoanHienTai = taiKhoanHienTaiId;
    
    if (danhSachGiaoVien && danhSachGiaoVien.length > 0) {
        khoiTaoDropdownGiaoVien(danhSachGiaoVien, taiKhoanHienTaiId);
    }
    
    // Vô hiệu hóa nút lưu và nộp báo cáo ban đầu (chưa chọn giáo viên)
    var nutLuu = document.querySelector('button[onclick="xulyLuuTam()"]');
    var nutNop = document.getElementById("nutNopBcao");
    if (nutLuu) nutLuu.disabled = true;
    if (nutNop) nutNop.disabled = true;
    
    // Nếu có tài khoản hiện tại và có trong danh sách, tự động chọn
    if (taiKhoanHienTai && danhSachGiaoVien && danhSachGiaoVien.some(gv => gv.id === taiKhoanHienTai || gv.ma === taiKhoanHienTai)) {
        var selectGv = document.getElementById("hopChonGv");
        if (selectGv) {
            for (var i = 0; i < selectGv.options.length; i++) {
                if (selectGv.options[i].value === taiKhoanHienTai) {
                    selectGv.selectedIndex = i;
                    break;
                }
            }
            // Không tự động kích hoạt, vì đã chọn giáo viên thì vẫn khóa nút
        }
    }
}

function gdang(ptu) { ptu.style.height = 'auto'; ptu.style.height = ptu.scrollHeight + 'px'; }
function cgon(ptu, ccao) { ptu.style.height = ccao; ptu.scrollTop = 0; }
function maHoaBcao(chu, tepdk) { let q = (chu || "").trim(); if (tepdk && tepdk.length > 0) { tepdk.forEach(t => { q += ` [FILE:${t.tentep}|${t.duongd}]`; }); } return q; }

function xulyTaiBcao(ptu) {
    if (!ptu.files || ptu.files.length === 0) return; hienTaiDl("⏳ Đang tải lên " + ptu.files.length + " file đính kèm...");
    let tdl = []; let dem = 0;
    Array.from(ptu.files).forEach(t => {
        let dc = new FileReader();
        dc.onload = function(err) {
            tdl.push({ tentep: t.name, kieu: t.type, dliu: err.target.result.split(',')[1] }); dem++;
            if (dem === ptu.files.length) {
                const hdt = { teps: tdl };
                if (typeof khachApi.taiTepBcao === 'function') {
                    khachApi.taiTepBcao(hdt, function(kq) {
                        anTaiDl(); ptu.value = ""; 
                        if ((kq && Array.isArray(kq)) || (kq && kq.ttai === 'tcong')) {
                            let kqd = Array.isArray(kq) ? kq : kq.dliu; if(!window.tepdinhkBcao) window.tepdinhkBcao = []; window.tepdinhkBcao = window.tepdinhkBcao.concat(kqd); veDinhKemBcao();
                            xulyLuuTam(true, function() { hienThongb('tcong', 'Đã đính kèm thành công ' + tdl.length + ' file!'); });
                        } else { let tl = (kq && kq.tbao) ? kq.tbao : "Lỗi"; hienThongb('loi', "Lỗi tải file: " + tl); }
                    }, function(loi) { anTaiDl(); ptu.value = ""; hienThongb('loi', "Lỗi kết nối Server: " + loi.message); });
                } else { anTaiDl(); hienThongb('loi', "Lỗi API"); }
            }
        }; dc.readAsDataURL(t);
    });
}

function veDinhKemBcao() {
    let kc = $('#vungDinhkBcao'); kc.empty(); if(!window.tepdinhkBcao || window.tepdinhkBcao.length === 0) return;
    window.tepdinhkBcao.forEach((tc, chs) => {
        let b = $(`<span class="badge bg-info text-dark shadow-sm" style="font-size: 12px; cursor: pointer; border: 1px solid #90caf9; padding: 4px 6px;" title="${tc.tentep}"><i class="bi bi-paperclip"></i> Báo cáo ${chs + 1} <i class="bi bi-x text-danger fw-bold ms-1" style="font-size: 15px;" onclick="xoaDinhKemBcao(${chs}); event.stopPropagation();" title="Xóa đính kèm này khỏi hệ thống"></i></span>`);
        b.on('click', function() { window.open(tc.duongd, '_blank'); }); kc.append(b);
    });
}

function xoaDinhKemBcao(chs) {
    const cbm = "Thầy/Cô có chắc chắn muốn xóa file đính kèm này khỏi hệ thống báo cáo không?";
    if (typeof hienThongb === 'function') { hienThongb('xn', cbm, function() { xulyXoaTepDc(chs); }); } else { if (confirm(cbm)) xulyXoaTepDc(chs); }
}

function xulyXoaTepDc(chs) {
    let tpx = window.tepdinhkBcao[chs]; hienTaiDl("⏳ Đang xóa file khỏi hệ thống...");
    if (typeof khachApi.xoaTepBcao === 'function') {
        khachApi.xoaTepBcao({ duongd: tpx.duongd }, function(kq) {
            if (kq && kq.ttai === 'tcong') { window.tepdinhkBcao.splice(chs, 1); veDinhKemBcao(); xulyLuuTam(true, function() { anTaiDl(); hienThongb('tcong', 'Đã xóa file đính kèm thành công!'); }); } 
            else { anTaiDl(); hienThongb('loi', "Lỗi xóa file: " + (kq.tbao || "Không xác định")); }
        }, function(loi) { anTaiDl(); hienThongb('loi', "Lỗi kết nối Server: " + loi.message); });
    } else { anTaiDl(); hienThongb('loi', "Lỗi API"); }
}

function xulyLuuTam(ath = false, xltc = null) {
    // Kiểm tra quyền truy cập khi có cột E và đã chọn giáo viên
    if (cotETonTai) {
        var selectGv = document.getElementById("hopChonGv");
        if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") {
            // Đã chọn giáo viên -> KHÔNG cho phép lưu
            if (typeof hienThongb === 'function') {
                hienThongb('loi', "⚠️ Bạn không có quyền lưu nhật ký của giáo viên khác. Vui lòng chọn đúng tài khoản của mình hoặc liên hệ quản trị.");
            } else {
                alert("Không có quyền lưu nhật ký của giáo viên khác.");
            }
            return;
        }
    }
    
    // Chỉ được lưu nhật ký của người khác nếu quyền là 'xxx' (admin)
    if (!window.PGV_IS_SELF && window.PGV_QUYEN !== 'xxx') {
        if (typeof hienThongb === 'function') hienThongb('loi', "Bạn không có quyền lưu nhật ký của người khác.");
        else alert("Không có quyền");
        return;
    }
    const ntl = document.querySelector('button[onclick="xulyLuuTam()"]'); if(ntl && !ath) ntl.disabled = true; if(!ath) hienTaiDl("✨ Đang ghi nhớ kết quả...");
    let dlbg = [];
    $('#bangNviec tbody tr').each(function() {
        if ($(this).find('td').length > 1) {
            let kqchon = $(this).find('.chonKq').val() || ""; let ndd = $(this).find('.nhapNgay').val() || ""; let ndc = $(this).find('.nhapNdung').val() || ""; let hc = ""; let ltd = "";
            if ($(this).attr('data-is-new') === "true") { hc = $(this).find('.nhapHchot').val() || ""; ltd = $(this).find('.nhapTdo').val() || ""; } 
            else { hc = $(this).attr('data-deadline') || ""; ltd = $(this).attr('data-type') || ""; }
            dlbg.push(["", ndc, hc, ltd, kqchon, ndd]);
        }
    });

    let qth = $('#chuKqHthi'); let chukq = qth.is('input, select, textarea') ? qth.val() : qth.text(); chukq = chukq ? chukq.trim() : "";
    const ht = { ttrg: canbHientai.canb.ttrg, snnghi: $('#nhapSngayNghi').val() || 0, dthuong: $('#nhapDiemThuong').val() || 0, ldo: $('#nhapLdoNghi').val() || "", kienn: $('#nhapYkien').val() || "", bcao: maHoaBcao($('#nhapBcao').val() || "", window.tepdinhkBcao), dlbang: dlbg, kq: chukq };

    khachApi.luuTam(ht, function(kq) {
        if(!ath) anTaiDl(); if(ntl && !ath) ntl.disabled = false; if(typeof mokBcao === 'function') mokBcao();
        if (kq && kq.ttai === 'tcong') { if (!ath) { if (typeof hienThongb === 'function') hienThongb('tcong', "Đã ghi nhớ kết quả thành công!"); else alert("Đã ghi nhớ kết quả thành công!"); } if(xltc) xltc(); } 
        else { let ltc = kq ? kq.tbao : "Lỗi"; if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi lưu: " + ltc); else alert("Lỗi lưu: " + ltc); }
    }, function(loi) { if(!ath) anTaiDl(); if(ntl && !ath) ntl.disabled = false; if (typeof hienThongb === 'function') hienThongb('loi', "Lỗi Server: " + loi.message); else alert("Lỗi Server: " + loi.message); });
}

function nopBcaoChinh() {
    // Kiểm tra quyền truy cập khi có cột E và đã chọn giáo viên
    if (cotETonTai) {
        var selectGv = document.getElementById("hopChonGv");
        if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") {
            // Đã chọn giáo viên -> KHÔNG cho phép nộp báo cáo
            if (typeof hienThongb === 'function') {
                hienThongb('loi', "⚠️ Bạn không có quyền nộp báo cáo của giáo viên khác. Vui lòng chọn đúng tài khoản của mình hoặc liên hệ quản trị.");
            } else {
                alert("Không có quyền nộp báo cáo của giáo viên khác.");
            }
            return;
        }
    }
    
    // Chỉ được nộp báo cáo của người khác nếu quyền là 'xxx' (admin)
    if (!window.PGV_IS_SELF && window.PGV_QUYEN !== 'xxx') {
        if (typeof hienThongb === 'function') hienThongb('loi', "Bạn không có quyền nộp báo cáo của người khác.");
        else alert("Không có quyền");
        return;
    }
    const gn = parseInt($('#nhapSngayNghi').val()) || 0, ld = $('#nhapLdoNghi').val().trim();
    if (gn > 0 && ld === "") { hienThongb('cbh', `Bạn đã có ${gn} ngày nghỉ.\nPhải nhập lý do!`, () => setTimeout(() => $('#nhapLdoNghi').focus(), 500)); return; }
    const yk = $('#nhapYkien').val().trim(), bc = $('#nhapBcao').val().trim();
    if (yk === "" || bc === "") { hienThongb('loi', "Thiếu: Ý kiến tham mưu hoặc Báo cáo tóm tắt"); return; }
    let bhl = true;
    $('#bangNviec tbody tr').each(function(i) {
      if ($(this).find('td').length < 2) return;
      if (!$(this).find('.chonKq').val() || !$(this).find('.nhapNgay').val()) { hienThongb('loi', `Dòng ${i + 1} chưa xong.\nChọn Kết quả và Ngày hoàn thành!`); bhl = false; return false; }
    }); if (!bhl) return;

    hienThongb('xn', "Hệ thống sẽ đồng bộ nhật ký và nộp báo cáo. Xác nhận?", function() {
      const ntn = document.getElementById('nutNopBcao'); if(ntn) ntn.disabled = true; hienTaiDl("🚀 Bước 1: Đang lưu vào nhật ký cá nhân...");
      xulyLuuTam(true, function() {
          hienTaiDl("🚀 Bước 2: Đang ghi vào dữ liệu tổng...");
          let ht = $('#chuKqHthi'); let chukq = ht.is('input, select, textarea') ? ht.val() : ht.text(); chukq = chukq ? chukq.trim() : "";
          const cnb = { ttrg: canbHientai.canb.ttrg, tenn: canbHientai.tde.tenn, snnghi: $('#nhapSngayNghi').val(), nhoc: canbHientai.tde.nhoc, tgian: canbHientai.tde.tgian, kq: chukq, dthuong: $('#nhapDiemThuong').val(), kienn: $('#nhapYkien').val(), bcao: maHoaBcao($('#nhapBcao').val() || "", window.tepdinhkBcao), ldo: $('#nhapLdoNghi').val(), taik: window.PGV_ID_TC };
          hienTaiDl("🚀 Bước 3: Thực hiện nộp báo cáo " + cnb.tgian);
          khachApi.nopBcao(cnb, function(kq) {
            anTaiDl(); if(ntn) ntn.disabled = false; 
            if (kq && kq.ttai === 'tcong') { $('#chuTrangThai').text("Đã nộp báo cáo"); let tc = (kq.lacn === true) ? "Đã nộp lại kết quả mới nhất của " + cnb.tgian : "Đã nộp xong kết quả " + cnb.tgian; hienThongb('tcong', tc); if(typeof taiDlBdau === 'function') taiDlBdau(); if(typeof khaBcao === 'function') khaBcao(); } 
            else { hienThongb('loi', "Lỗi nộp báo cáo: " + (kq ? kq.tbao : "Lỗi")); }
          }, function(loi) { if(ntn) ntn.disabled = false; if(typeof khiLoiMayChu === 'function') khiLoiMayChu(loi); });
      });
    });
}

function mokBcao() { 
    mbcMo = true; 
    const nt = document.getElementById('nutNopBcao'); 
    if(nt && nt.style.display !== 'none') { 
        // Chỉ kích hoạt nút nếu không có cột E hoặc chưa chọn giáo viên
        if (!cotETonTai) {
            nt.disabled = false;
        } else {
            var selectGv = document.getElementById("hopChonGv");
            if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") {
                nt.disabled = true;
            } else {
                // Chỉ cho phép nếu là chính tài khoản của mình
                if (window.PGV_IS_SELF === true || window.PGV_QUYEN === 'xxx') {
                    nt.disabled = false;
                } else {
                    nt.disabled = true;
                }
            }
        }
        nt.style.transition = "transform 0.2s"; 
        nt.style.transform = "scale(1.1)"; 
        setTimeout(() => nt.style.transform = "scale(1)", 200); 
    } 
}
function khaBcao() { if (!mbcMo) { const nt = document.getElementById('nutNopBcao'); if(nt && nt.style.display !== 'none') nt.disabled = true; } }

function veBangNviec(db) {
    khaBcao(); const bg = $('#bangNviec tbody').empty();
    if (!db || db.length === 0) { bg.append('<tr><td colspan="7" class="text-center text-muted py-3 small">Chưa có nhiệm vụ.2%2%</td></tr>'); tinhtTdong(); return; }
    const showDeleteBtn = window.PGV_CAN_SHOW_DELETE_BUTTON === true;
    db.forEach((dong, chs) => {
        let sn = chs + 1; let ndc = dong[1] ? String(dong[1]) : ""; let hc = dong[2] || ""; let ltd = dong[3] || ""; let kqchon = dong[4] || ""; let nht = dong[5]; let ndd = hdNgay(nht); let nttc = hdNgay(hc);
        let nutx = showDeleteBtn ? `<button class="btn btn-sm btn-danger py-0 px-2" onclick="xoaDongNv(this)" title="Xoá dòng (Quyền Admin)">✕</button>` : ``;
        let dg = `<tr class="dongNv" data-deadline="${nttc}" data-type="${ltd}" data-is-new="false"><td class="text-center align-middle oStt">${sn}</td><td><textarea class="form-control nhapNdung" readonly oninput="cdang(this)" onfocus="cdang(this)" rows="1">${ndc}</textarea></td><td class="text-center align-middle">${nttc}</td><td class="text-center align-middle">${ltd}</td><td class="align-middle"><select class="form-select form-select-sm chonKq shadow-sm" onchange="tinhtTdong()" style="border:none; font-size:13px;"><option value="">-- Chọn --</option><option value="Chất lượng đạt yêu cầu" ${kqchon === 'Chất lượng đạt yêu cầu' ? 'selected' : ''}>Đạt yêu cầu</option><option value="Chất lượng chưa đạt yêu cầu" ${kqchon === 'Chất lượng chưa đạt yêu cầu' ? 'selected' : ''}>Chưa đạt</option></select></td><td class="align-middle"><input type="text" class="form-control form-control-sm nhapNgay shadow-sm text-center" onchange="tinhtTdong()" onkeyup="tinhtTdong()" value="${ndd}" placeholder="dd/mm/yyyy" style="font-size:13px;"></td><td class="text-center align-middle">${nutx}</td></tr>`; bg.append(dg);
    });
    setTimeout(() => { $('#bangNviec textarea').each(function() { cdang(this); }); tinhtTdong(); khaBcao(); }, 10);
}

function cdang(ptu) { ptu.style.height = 'auto'; ptu.style.height = (ptu.scrollHeight) + 'px'; }

function addNv() {
    // Kiểm tra nếu đang xem dữ liệu của giáo viên khác thì không cho thêm nhiệm vụ
    if (cotETonTai) {
        var selectGv = document.getElementById("hopChonGv");
        if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") {
            if (typeof hienThongb === 'function') {
                hienThongb('loi', "⚠️ Bạn không thể thêm nhiệm vụ khi đang xem dữ liệu của giáo viên khác.");
            }
            return;
        }
    }
    
    const bg = $('#bangNviec tbody'); if (bg.find('tr td').length === 1 && bg.find('tr td').attr('colspan') == '7') { bg.empty(); } let sn = bg.find('tr.dongNv').length + 1;
    const showDeleteBtn = window.PGV_CAN_SHOW_DELETE_BUTTON === true;
    let deleteBtnHtml = showDeleteBtn ? `<button class="btn btn-sm btn-danger py-0 px-2" onclick="xoaDongNv(this)" title="Xoá dòng này">✕</button>` : ``;
    let dg = `<tr class="dongNv" data-deadline="" data-type="" data-is-new="true"><td class="text-center align-middle oStt">${sn}</td><td><textarea class="form-control nhapNdung" oninput="cdang(this)" rows="1" placeholder="Nhập nội dung..."></textarea></td><td class="align-middle"><input type="text" class="form-control form-control-sm nhapHchot text-center" placeholder="dd/mm/yyyy" onchange="cnDong(this)"></td><td class="align-middle"><input type="text" class="form-control form-control-sm nhapTdo text-center" placeholder="Loại tiến độ..." onchange="cnDong(this)"></td><td class="align-middle"><select class="form-select form-select-sm chonKq shadow-sm" onchange="tinhtTdong()" style="border:none; font-size:13px;"><option value="">-- Chọn --</option><option value="Chất lượng đạt yêu cầu">Đạt yêu cầu</option><option value="Chất lượng chưa đạt yêu cầu">Chưa đạt</option></select></td><td class="align-middle"><input type="text" class="form-control form-control-sm nhapNgay shadow-sm text-center" onchange="tinhtTdong()" onkeyup="tinhtTdong()" value="" placeholder="dd/mm/yyyy" style="font-size:13px;"></td><td class="text-center align-middle">${deleteBtnHtml}</td></tr>`; bg.append(dg); tinhtTdong(); if(typeof mokBcao === 'function') mokBcao();
}

function cnDong(ptu) { const dr = $(ptu).closest('tr'); dr.attr('data-deadline', dr.find('.nhapHchot').val() || ""); dr.attr('data-type', dr.find('.nhapTdo').val() || ""); tinhtTdong(); }

function xoaDongNv(nt) {
    if (window.PGV_CAN_SHOW_DELETE_BUTTON !== true) return;
    
    // Kiểm tra nếu đang xem dữ liệu của giáo viên khác thì không cho xóa
    if (cotETonTai) {
        var selectGv = document.getElementById("hopChonGv");
        if (selectGv && selectGv.style.display !== "none" && selectGv.value && selectGv.value !== "") {
            if (typeof hienThongb === 'function') {
                hienThongb('loi', "⚠️ Bạn không thể xóa nhiệm vụ khi đang xem dữ liệu của giáo viên khác.");
            }
            return;
        }
    }
    
    const cbm = "Thầy/Cô có chắc chắn muốn xoá nhiệm vụ này không?\n\nLưu ý: Bấm 'Lưu nhật ký' để đồng bộ."; 
    if (typeof hienThongb === 'function') { hienThongb('xn', cbm, function() { $(nt).closest('tr').remove(); dlStt(); tinhtTdong(); if(typeof mokBcao === 'function') mokBcao(); }); } 
    else { if (confirm(cbm)) { $(nt).closest('tr').remove(); dlStt(); tinhtTdong(); if(typeof mokBcao === 'function') mokBcao(); } }
}

function dlStt() { $('#bangNviec tbody tr.dongNv').each(function(chs) { $(this).find('.oStt').text(chs + 1); }); if ($('#bangNviec tbody tr.dongNv').length === 0) { $('#bangNviec tbody').html('<tr><td colspan=\"7\" class=\"text-center text-muted py-3 small\">Chưa có nhiệm vụ.2%2%</td></tr>'); } }

function tinhtTdong() {
    const dtc = document.getElementById('nhapDiemThuong'); let dc = dtc ? (parseFloat(dtc.value) || 0) : 0;
    if(dtc) { dtc.classList.remove('diemCong', 'diemTru', 'diemKhong'); if (dc > 0) dtc.classList.add('diemCong'); else if (dc < 0) dtc.classList.add('diemTru'); else dtc.classList.add('diemKhong'); }
    let tv = 0, ddg = 0, dcl = 0, dh = 0, vtd = 0, dt_T = 0; const cdt = document.querySelectorAll('#bangNviec tbody tr.dongNv'); tv = cdt.length; const ht = new Date(); ht.setHours(0, 0, 0, 0);

    cdt.forEach((dg, chs) => { 
        const hnc = dg.getAttribute('data-deadline'), ltR = dg.getAttribute('data-type') || "", lh = ltR.toLowerCase(); const cg = dg.querySelector('.chonKq'), kq = cg ? cg.value : ""; const idt = dg.querySelector('.nhapNgay'), ndht = idt ? idt.value : ""; dg.classList.remove('nenSom', 'nenHnay', 'nenTre'); 
        let dd = null; if (chs < 2) { dd = ht; } else { let cd = chNgayVN(hnc); if(cd) { cd.setHours(0,0,0,0); dd = cd; } }
        let df = chNgayVN(ndht); if (df && dd) { df.setHours(0, 0, 0, 0); if (df.getTime() < dd.getTime()) { dg.classList.add('nenSom'); } else if (df.getTime() === dd.getTime()) { dg.classList.add('nenHnay'); } else { dg.classList.add('nenTre'); } }
        if (kq !== "") {
            ddg++; let cq = (kq === "Chất lượng đạt yêu cầu"), kl = kNgay(hnc, ndht); 
            if (cq) dcl++; if (kl !== null && kl >= 0) dh++; if (cq && kl !== null && kl >= 2 && lh.includes("cho vượt tiến độ")) { vtd++; }
            if (chs >= 2) { if(cq) { if(kl !== null && kl >= 0) { dt_T += 1; if(kl >= 2 && lh.includes("cho vượt tiến độ")) { dt_T += 1; } } } }
        }
    });

    let xpl = "Chưa hoàn thành", dcs = 0;
    if (tv === 0) { xpl = "Chưa giao việc"; } else if (tv > 0 && ddg === 0) { xpl = "Chưa đánh giá"; } else {
        let pcd = (dcl / tv) * 100, pdh = (dh / tv) * 100, pvt = (vtd / tv) * 100;
        if (pcd >= 100 && pdh >= 100 && pvt >= 30) { xpl = "Xuất sắc"; dcs = 95; } else if (pcd >= 100 && pdh >= 100) { xpl = "Hoàn thành tốt"; dcs = 85; } else if (pcd >= 70 && pdh >= 70) { xpl = "Hoàn thành"; dcs = 75; } else { xpl = "Chưa hoàn thành"; dcs = 0; }
    }
    let tdg = 0; if (xpl !== "Chưa giao việc" && xpl !== "Chưa đánh giá") { tdg = Math.min(dcs + dt_T, 100); } let dcg = tdg + dc;
    const qht = document.getElementById('chuKqHthi');
    if (qht) { qht.innerText = `${xpl}: ${dcg} điểm`; qht.className = "fw-bold epMotDong"; if (xpl === "Xuất sắc") qht.classList.add("text-success"); else if (xpl.includes("Hoàn thành")) qht.classList.add("text-primary"); else qht.classList.add("text-danger"); }
}

function kNgay(h, f) { if (!f) return null; let df = chNgayVN(f); if (!df) return null; let dd = chNgayVN(h); if (!dd) return 0; const k = dd - df; return Math.ceil(k / (1000 * 60 * 60 * 24)); }
function chNgayVN(c) { if (!c || typeof c !== 'string') return null; const sc = c.trim().replace(/[-.]/g, '/'); const pt = sc.split('/'); if (pt.length !== 3) return null; let n = parseInt(pt[0], 10), m = parseInt(pt[1], 10), y = parseInt(pt[2], 10); if (isNaN(n) || isNaN(m) || isNaN(y)) return null; return new Date(y, m - 1, n); }
function hdNgay(nc) { if (!nc) return ""; let cs = String(nc).trim(); if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(cs)) return cs; if (cs.length >= 10 && cs.charAt(4) === '-') { let px = cs.substring(0, 10).split('-'); if(px.length === 3) return px[2] + '/' + px[1] + '/' + px[0]; } let cl = cs.replace(/\(.*?\)/g, '').trim(); let dt = new Date(cl); if (!isNaN(dt.getTime())) { let ng = dt.getDate(), th = dt.getMonth() + 1, na = dt.getFullYear(); return (ng < 10 ? '0' + ng : ng) + '/' + (th < 10 ? '0' + th : th) + '/' + na; } return nc; }
function capnhTdong() { tinhtTdong(); }
