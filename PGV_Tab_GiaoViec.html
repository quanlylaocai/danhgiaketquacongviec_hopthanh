<style>
  #khuGvChinh { font-family: 'Times New Roman', Times, serif; font-size: 14px; }
  #khuGvChinh .hopDau { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 2px solid #0d6efd; padding-bottom: 5px; background-color: #f8f9fa; padding: 10px; border-radius: 4px; }
  #khuGvChinh .tDe { font-weight: bold; font-size: 20px; color: #dc3545; text-transform: uppercase; margin: 0; }
  #khuGvChinh .hopLoc { display: flex; gap: 10px; align-items: center; }
  #khuGvChinh .nhapTuyChinh { font-size: 16px; font-weight: bold; color: #0d6efd; border: 1px solid #ced4da; padding: 4px 10px; border-radius: 4px; height: 34px; }
  #khuGvChinh .hopBang { background: white; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 5px; }
  #khuGvChinh table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  #khuGvChinh th { background-color: #0d6efd; color: white; text-align: center; padding: 8px 4px; border: 1px solid #dee2e6; vertical-align: middle; font-size: 13px; }
  #khuGvChinh td { border: 1px solid #999; padding: 0 !important; vertical-align: middle; }
  
  /* Textarea mặc định cho phép giãn theo nội dung, kể cả khi disabled */
  #gvBangNv textarea.form-control {
    font-family: 'Times New Roman', Times, serif;
    font-size: 14px;
    border: none !important;
    border-radius: 0;
    box-shadow: none !important;
    width: 100%;
    padding: 6px 4px;
    margin: 0;
    background-color: transparent;
    resize: none;
    overflow-y: visible !important;      /* Quan trọng: hiển thị toàn bộ nội dung khi disabled */
    min-height: 35px;
    height: auto !important;            /* Tự động cao theo nội dung */
    line-height: 1.4;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-sizing: border-box;
  }
  /* Đảm bảo textarea disabled vẫn hiển thị đủ nội dung */
  #gvBangNv textarea.form-control:disabled {
    overflow-y: visible !important;
    height: auto !important;
    background-color: transparent;
    cursor: default;
  }
  
  #gvBangNv input.form-control, #gvBangNv select.form-select { font-family: 'Times New Roman', Times, serif; font-size: 14px; border: none !important; box-shadow: none !important; width: 100%; height: 100%; padding: 4px; background-color: transparent; }
  #khuGvChinh td.oHdong { text-align: center; padding: 2px !important; background-color: #f8f9fa; }
  #khuGvChinh .nutThem { margin-top: 5px; font-size: 13px; font-weight: bold; }
  
  #gvLopPhuTai { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
  #gvChuTai { margin-top: 20px; font-size: 22px; font-weight: 900; text-align: center; letter-spacing: 1.5px; text-transform: uppercase; background: linear-gradient(45deg, #0d6efd, #6610f2, #dc3545, #0d6efd); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 2px 2px 10px rgba(0,0,0,0.1); animation: gradientMove 3s ease infinite, pulseText 1.5s infinite ease-in-out; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  #khuGvChinh select:disabled { background-color: #e9ecef !important; cursor: not-allowed; color: #6c757d; font-weight: bold; }
</style>

<div id="khuGvChinh">
    <div id="gvLopPhuTai"><div class="spinner-border text-primary spinner-border-lg" role="status"><span class="visually-hidden">Đang xử lý...</span></div><div id="gvChuTai">Đang xử lý...</div></div>
    <div class="hopDau">
      <div class="d-flex align-items-center">
        <div class="tDe">PHIẾU GIAO NHIỆM VỤ</div>
        <button id="btnCapNhatChung" class="btn btn-warning btn-sm fw-bold ms-3 shadow-sm" style="display:none;" onclick="gvCapNhatNhiemVuChung()"><i class="bi bi-pencil-square"></i> Cập nhật nhiệm vụ chung</button>
      </div>
      <div class="hopLoc">
        <button id="gvNutChth" class="btn btn-danger btn-sm fw-bold nhapTuyChinh" style="color: white; border: none; padding: 4px 10px; display: flex; align-items: center;" onclick="gvXlmChth(this)">Chuyển tháng mới</button>
        <select id="gvLocNam" class="form-select nhapTuyChinh" style="width: 140px;">
          <option value="2024-2025">2024-2025</option><option value="2025-2026" selected>2025-2026</option><option value="2026-2027">2026-2027</option>
        </select>
        <select id="gvLocThang" class="form-select nhapTuyChinh" style="width: 120px;">
          <option value="Tháng 1">Tháng 1</option><option value="Tháng 2">Tháng 2</option><option value="Tháng 3">Tháng 3</option><option value="Tháng 4">Tháng 4</option>
          <option value="Tháng 5">Tháng 5</option><option value="Tháng 6">Tháng 6</option><option value="Tháng 7">Tháng 7</option><option value="Tháng 8">Tháng 8</option>
          <option value="Tháng 9">Tháng 9</option><option value="Tháng 10">Tháng 10</option><option value="Tháng 11">Tháng 11</option><option value="Tháng 12">Tháng 12</option>
        </select>
      </div>
    </div>

    <div class="hopBang">
      <table id="gvBangNv">
        <thead><tr><th style="width: 40px;">Xóa</th><th style="width: 40px;">TT</th><th style="width: 35%;">Nội dung công việc</th><th style="width: 120px;">Thời gian HT</th><th style="width: 15%;">Loại tiến độ</th><th style="width: 15%;">Người thực hiện</th><th style="width: 20%;">Ghi chú</th></tr></thead>
        <tbody id="gvThanBang"></tbody>
      </table>
      <button class="btn btn-success nutThem" onclick="gvThemDong()">+ Thêm dòng mới</button>
    </div>

    <div class="modal fade" id="gvHopThoaiXoa" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
      <div class="modal-dialog modal-dialog-centered"><div class="modal-content border-danger"><div class="modal-header bg-danger text-white"><h5 class="modal-title fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> CẢNH BÁO</h5><button type="button" class="btn-close" data-bs-dismiss="modal" onclick="gvHuyXoa()"></button></div><div class="modal-body text-center p-4"><p class="fs-6 mb-3">Bạn đang chọn <strong>XÓA TOÀN BỘ DỮ LIỆU CŨ</strong>.</p><p class="text-danger fw-bold">Hành động này sẽ xóa sạch dữ liệu hiện tại.</p></div><div class="modal-footer justify-content-center"><button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal" onclick="gvHuyXoa()">Hủy bỏ</button><button type="button" class="btn btn-danger px-4 fw-bold" onclick="gvXndongXoa()">Đồng ý Xóa</button></div></div></div>
    </div>

    <div class="modal fade" id="gvHopThoaiTb" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered"><div class="modal-content shadow"><div class="modal-header text-white" id="gvDauHtTb"><h5 class="modal-title fw-bold" id="gvTdeHtTb">THÔNG BÁO</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center p-4"><div id="gvBtuongHtTb" class="mb-3" style="font-size: 3rem;"></div><p class="fs-6 fw-bold" id="gvNdHtTb">...</p></div><div class="modal-footer justify-content-center"><button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Đóng</button></div></div></div>
    </div>
</div>

<script>
    let dsCanbgv = []; 
    let ddemDong = 1; 
    let tdtaiXoaCho = null; 
    let ptuChoXoa = null;

    // Hàm áp dụng quyền cho giao diện
    function apDungQuyenGiaoViec() {
        // Nút Chuyển tháng mới
        if (window.PGV_SHOW_CHUYEN_THANG === true) {
            $('#gvNutChth').show();
        } else {
            $('#gvNutChth').hide();
        }
        // Nút Cập nhật nhiệm vụ chung
        if (window.PGV_SHOW_BATCH_UPDATE === true) {
            $('#btnCapNhatChung').show();
        } else {
            $('#btnCapNhatChung').hide();
        }
        // Ô Năm học, Tháng
        if (window.PGV_YEAR_MONTH_READONLY === true) {
            $('#gvLocNam, #gvLocThang').prop('disabled', true).addClass('readonly-bg');
        } else {
            $('#gvLocNam, #gvLocThang').prop('disabled', false).removeClass('readonly-bg');
        }
        // Nút Thêm dòng: với quyền x, xx, xxx đều có (giữ nguyên)
        $('.nutThem').show();
    }

    // Hàm điều chỉnh chiều cao textarea theo nội dung (kể cả khi disabled)
    function gvAutoResizeTextarea(textarea) {
        if (!textarea) return;
        // Reset height để tính toán chính xác
        textarea.style.height = 'auto';
        // Lấy chiều cao thực tế của nội dung (scrollHeight)
        let newHeight = textarea.scrollHeight;
        // Giới hạn tối thiểu 35px, tối đa 300px (có thể tùy chỉnh)
        if (newHeight < 35) newHeight = 35;
        if (newHeight > 300) newHeight = 300;
        textarea.style.height = newHeight + 'px';
    }

    // Gọi resize cho tất cả textarea trong bảng (dùng khi load dữ liệu)
    function gvResizeAllTextareas() {
        document.querySelectorAll('#gvBangNv textarea.form-control').forEach(function(tx) {
            gvAutoResizeTextarea(tx);
        });
    }

    setTimeout(function() { 
        gvTaiCanb(); 
    }, 500);

    function gvTbaoNhanh(loai, tb) {
        const mh = document.getElementById('gvHopThoaiTb');
        const hd = document.getElementById('gvDauHtTb');
        const td = document.getElementById('gvTdeHtTb');
        const ct = document.getElementById('gvNdHtTb');
        const bg = document.getElementById('gvBtuongHtTb');
        
        hd.classList.remove('bg-success', 'bg-danger', 'bg-warning', 'text-dark', 'text-white'); 
        ct.innerText = tb;
        
        if (loai === 'tcong') { 
            hd.classList.add('bg-success', 'text-white'); 
            td.innerText = "THÀNH CÔNG"; 
            bg.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i>'; 
        } else if (loai === 'loi') { 
            hd.classList.add('bg-danger', 'text-white'); 
            td.innerText = "LỖI"; 
            bg.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i>'; 
        } else if (loai === 'cbh') { 
            hd.classList.add('bg-warning', 'text-dark'); 
            td.innerText = "CẢNH BÁO"; 
            bg.innerHTML = '<i class="bi bi-exclamation-triangle-fill text-warning"></i>'; 
            hd.classList.remove('text-white'); 
        } else { 
            hd.classList.add('bg-primary', 'text-white'); 
            td.innerText = "THÔNG BÁO"; 
            bg.innerHTML = '<i class="bi bi-info-circle-fill text-primary"></i>'; 
        }
        
        const hm = new bootstrap.Modal(mh); 
        hm.show();
    }

    function gvDatTai(dt, tbt = null) {
        const mh = document.getElementById('gvLopPhuTai');
        const ct = document.getElementById('gvChuTai');
        const vq = mh.querySelector('.spinner-border');
        
        if (dt) { 
            ct.innerText = tbt || "Đang xử lý..."; 
            if (tbt && (tbt.toLowerCase().includes("nhiệm vụ chung") || tbt.toLowerCase().includes("dọn"))) { 
                ct.style.backgroundImage = "linear-gradient(45deg, #dc3545, #fd7e14, #ffc107, #dc3545)"; 
                vq.className = "spinner-border text-danger spinner-border-lg"; 
            } else { 
                ct.style.backgroundImage = "linear-gradient(45deg, #0d6efd, #6610f2, #dc3545, #0d6efd)"; 
                vq.className = "spinner-border text-primary spinner-border-lg"; 
            } 
            mh.style.display = 'flex'; 
        } else { 
            mh.style.display = 'none'; 
        }
    }

    function gvTaiCanb() { 
        gvDatTai(true, "Đang tải danh sách nhân sự (để giao việc)..."); 
        khachApi.gvLaydsCanb(
            function(dl) { 
                dsCanbgv = dl; 
                gvLaydlGoc(); 
            }, 
            function(l) { 
                gvTbaoNhanh('loi', "Lỗi tải nhân sự: " + l.message); 
                gvDatTai(false); 
            }
        ); 
    }

    function gvLaydlGoc() { 
        gvDatTai(true, "✨ Đang cập nhật nhiệm vụ mới ✨"); 
        khachApi.gvLaydlBdau(
            gvKhiTaiXong, 
            function(l) { 
                gvTbaoNhanh('loi', "Lỗi tải dữ liệu: " + l.message); 
                gvDatTai(false); 
            }
        ); 
    }

    function gvKhiTaiXong(dl) {
        gvDatTai(false); 
        if(dl.nam) document.getElementById('gvLocNam').value = dl.nam; 
        if(dl.thang) document.getElementById('gvLocThang').value = dl.thang;
        
        const bns = dl.dlbang;
        const tb = document.getElementById('gvThanBang'); 
        tb.innerHTML = ""; 
        ddemDong = 1; 
        
        if (bns && bns.length > 0) { 
            bns.forEach(dong => { 
                gvVeDong(dong); 
            }); 
            const dcstt = parseInt(bns[bns.length - 1][0]); 
            if (!isNaN(dcstt)) { 
                ddemDong = dcstt + 1; 
            } 
            // Resize tất cả textarea sau khi vẽ xong
            setTimeout(function() { 
                gvResizeAllTextareas();
                // Vẫn giữ sự kiện cho textarea không disabled (nếu có)
                document.querySelectorAll('#khuGvChinh textarea.form-control:not(:disabled)').forEach(ptu => gvCoDan(ptu));
            }, 100);
        } else { 
            gvVeDong(); 
        }
        
        // Áp dụng quyền sau khi vẽ bảng (ẩn/hiện nút, disable ô năm tháng)
        apDungQuyenGiaoViec();
    }

    // ================= HÀM XỬ LÝ DẤU * =================
    function gvKiemTraDauSao(textarea) {
        const dong = textarea.closest('tr');
        const ndung = textarea.value.trim();
        const oNgayGv = dong.querySelector('.oNgayGv');
        const oNnghanGv = dong.querySelector('.oNnghanGv');
        const isNewRow = dong.getAttribute('data-is-new') === 'true';
        
        if (ndung.startsWith("*")) {
            // Gán "Nhiệm vụ chung" cho cột thời gian HT
            if (oNgayGv.value !== "Nhiệm vụ chung") {
                oNgayGv.value = "Nhiệm vụ chung";
                oNgayGv.disabled = true;
                oNgayGv.style.backgroundColor = '#d1e7dd';
            }
            // Gán "ALL" cho người thực hiện
            if (oNnghanGv.value !== "ALL") {
                oNnghanGv.value = "ALL";
                oNnghanGv.disabled = true;
                oNnghanGv.style.backgroundColor = '#d1e7dd';
            }
        } else {
            // Nếu dòng mới và không còn dấu *, trả về trạng thái bình thường
            if (isNewRow) {
                if (oNgayGv.disabled) {
                    oNgayGv.disabled = false;
                    oNgayGv.value = "";
                    oNgayGv.style.backgroundColor = '';
                }
                if (oNnghanGv.disabled && oNnghanGv.value === "ALL") {
                    oNnghanGv.disabled = false;
                    oNnghanGv.value = "";
                    oNnghanGv.style.backgroundColor = '';
                }
            }
        }
        // Cập nhật lại chiều cao textarea sau khi thay đổi nội dung
        gvAutoResizeTextarea(textarea);
    }

    function gvVeDong(dong = null) {
        const tb = document.getElementById('gvThanBang');
        const tr = document.createElement('tr');
        
        let ngnth = (dong && dong[4]) ? dong[4] : "";
        let ngnthH = ngnth.toUpperCase();
        const isReadonlyMode = (window.PGV_GIAO_VIEC_READONLY === true);
        // Nếu là chế độ readonly và có dòng cũ thì disable tất cả input/select của dòng đó
        let dcb = (dong && (ngnth !== "" || isReadonlyMode)) ? "disabled" : "";
        
        let btnxoa = dong ? `<i class="bi bi-lock-fill text-secondary" title="Đã lưu, không thể xoá"></i>` : `<button class="btn btn-danger btn-sm p-0" style="width:24px; height:24px; line-height:20px;" onclick="gvXoaDong(this)">X</button>`;
        // Nếu là dòng cũ và đang ở chế độ readonly, không cho xóa (chỉ hiển thị icon khóa)
        if (isReadonlyMode && dong) {
            btnxoa = `<i class="bi bi-lock-fill text-secondary" title="Không thể xóa"></i>`;
        }
        
        let lchon = `<option value="">--Chọn--</option>`;
        if (!dcb || ngnthH === 'ALL' || ngnthH === '-TOÀN TRƯỜNG-') { 
            let tchon = (ngnthH === 'ALL' || ngnthH === '-TOÀN TRƯỜNG-') ? "selected" : ""; 
            lchon += `<option value="ALL" style="font-weight:bold; color:blue;" ${tchon}>-TOÀN TRƯỜNG-</option>`; 
        }
        
        dsCanbgv.forEach(s => { 
            let chon = (ngnth === s.ttrg || ngnth === s.tenn) ? "selected" : ""; 
            lchon += `<option value="${s.ttrg}" data-name="${s.tenn}" ${chon}>${s.tenn}</option>`; 
        });
        
        let bstt = ddemDong, bnd = "", bhc = "", bltd = "", bgc = "";
        if (dong) { 
            bstt = dong[0]; 
            bnd = dong[1] || ""; 
            bhc = dong[2] || ""; 
            bltd = dong[3] || ""; 
            bgc = dong[5] || ""; 
            ddemDong = parseInt(bstt) + 1; 
        } else { 
            ddemDong++; 
        }
        
        const cv = (bltd === "Cho vượt tiến độ") ? "selected" : "";
        
        // Tạo dòng mới (nếu dong === null) thì dùng oninput có gọi gvKiemTraDauSao
        let textareaOnInput = dong === null ? 'oninput="gvCoDan(this); gvKiemTraDauSao(this)"' : 'oninput="gvCoDan(this); gvKiemTraDauSao(this)"';
        tr.innerHTML = `<td class="oHdong">${btnxoa}</td><td class="text-center"><input type="text" class="form-control text-center oSttGv" value="${bstt}" readonly></td><td><textarea class="form-control oNdGv" placeholder="Nhập nội dung..." rows="1" ${textareaOnInput} onfocus="gvCoDan(this)"></textarea></td><td><input type="text" class="form-control text-center oNgayGv" placeholder="dd/mm/yyyy" onkeyup="gvDinhDangNgay(this, event)"></td><td><select class="form-select text-center oTdoGv" ${dcb}><option value="">--Chọn--</option><option value="Cho vượt tiến độ" ${cv}>Cho vượt tiến độ</option></select></td><td><select class="form-select oNnghanGv" onchange="gvDoiNgn(this)" ${dcb}>${lchon}</select></td><td><textarea class="form-control text-center oGchuGv" placeholder="Ghi chú" rows="1" oninput="gvCoDan(this)" onfocus="gvCoDan(this)"></textarea></td>`;
        
        tr.querySelector('.oNdGv').value = bnd;
        tr.querySelector('.oNgayGv').value = bhc;
        tr.querySelector('.oTdoGv').value = bltd;
        tr.querySelector('.oGchuGv').value = bgc;
        
        // Nếu là dòng cũ có dấu * thì set lại disabled và giá trị
        if (dong && bnd.trim().startsWith("*")) {
            const oNgay = tr.querySelector('.oNgayGv');
            const oNguoi = tr.querySelector('.oNnghanGv');
            oNgay.value = "Nhiệm vụ chung";
            oNgay.disabled = true;
            oNgay.style.backgroundColor = '#d1e7dd';
            oNguoi.value = "ALL";
            oNguoi.disabled = true;
            oNguoi.style.backgroundColor = '#d1e7dd';
        }
        
        // Nếu chế độ readonly và là dòng cũ, disable tất cả input/select (trừ STT)
        if (isReadonlyMode && dong) {
            tr.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.classList && !el.classList.contains('oSttGv')) {
                    el.disabled = true;
                }
            });
        }
        
        tb.appendChild(tr);
        
        // Resize ngay sau khi thêm dòng (đối với dòng mới)
        if (dong === null) {
            const newTextarea = tr.querySelector('.oNdGv');
            if (newTextarea) gvAutoResizeTextarea(newTextarea);
        } else {
            // Với dòng cũ, cũng cần resize để hiển thị đủ nội dung
            const oldTextarea = tr.querySelector('.oNdGv');
            if (oldTextarea) gvAutoResizeTextarea(oldTextarea);
        }
    }
    
    function gvCoDan(ptu) { 
        // Chỉ resize khi textarea không bị disabled
        if (!ptu.disabled) {
            ptu.style.height = 'auto'; 
            ptu.style.height = (ptu.scrollHeight) + 'px'; 
        }
    }

    function gvDinhDangNgay(ptu, e) {
        if (e && (e.which === 8 || e.which === 46)) return;
        let v = ptu.value.replace(/\D/g, ''); 
        if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
        if (v.length > 5) v = v.substring(0, 5) + '/' + v.substring(5, 9);
        ptu.value = v;
    }
    
    function gvThemDong() { 
        ddemDong = document.querySelectorAll('#gvThanBang tr').length + 1; 
        gvVeDong(null); 
        // Resize lại sau khi thêm
        setTimeout(gvResizeAllTextareas, 50);
    }
    
    function gvXoaDong(btn) { 
        if (window.PGV_GIAO_VIEC_READONLY === true) return;
        btn.closest('tr').remove(); 
        gvDanhLaiStt(); 
        setTimeout(gvResizeAllTextareas, 50);
    }
    
    function gvDanhLaiStt() { 
        const sds = document.querySelectorAll('#gvThanBang tr'); 
        let tb = 1; 
        sds.forEach(d => { 
            d.querySelector('.oSttGv').value = tb++; 
        }); 
        ddemDong = tb; 
    }

    function gvDoiNgn(ptu) {
        if (window.PGV_GIAO_VIEC_READONLY === true) return;
        
        const dong = ptu.closest('tr'); 
        const ndg = dong.querySelector('.oNdGv').value.trim();
        
        if (!ndg) { 
            gvTbaoNhanh('cbh', "Nội dung công việc không được để trống!"); 
            ptu.value = ""; 
            return; 
        }
        
        const gt = ptu.value; 
        if (!gt) return; 
        
        const gth = gt.toUpperCase();

        const nm = document.getElementById('gvLocNam').value; 
        
        let tngn = ""; 
        if (gth !== 'DELETE' && gth !== 'ALL') { 
            tngn = ptu.options[ptu.selectedIndex].getAttribute('data-name'); 
        }
        
        const nvx = { 
            stt: dong.querySelector('.oSttGv').value, 
            ndung: ndg, 
            hchot: dong.querySelector('.oNgayGv').value, 
            tdo: dong.querySelector('.oTdoGv').value, 
            gchu: dong.querySelector('.oGchuGv').value, 
            ngnhan: gt, 
            trangngnhan: gt, 
            tenngnhan: tngn 
        };
        
        const th_htai = document.getElementById('gvLocThang').value;
        let tbht = (gth === 'ALL') ? "🚀 Đang giao cho TOÀN TRƯỜNG 🚀" : "⏳ Đang gửi cho " + tngn + "...";
        gvDatTai(true, tbht); 
        gvGoiMayChu(nm, th_htai, nvx, ptu, gth);
    }

    function gvCapNhatNhiemVuChung() {
        const nm = document.getElementById('gvLocNam').value;
        const th_htai = document.getElementById('gvLocThang').value;
        let dsNviec = [];

        const sds = document.querySelectorAll('#gvThanBang tr');
        sds.forEach(dong => {
            const ndg = dong.querySelector('.oNdGv').value.trim();
            if (ndg !== "") {
                dsNviec.push({
                    stt: dong.querySelector('.oSttGv').value,
                    ndung: ndg,
                    hchot: dong.querySelector('.oNgayGv').value.trim(),
                    tdo: dong.querySelector('.oTdoGv').value,
                    gchu: dong.querySelector('.oGchuGv').value.trim(),
                    ngnhan: "ALL",
                    trangngnhan: "ALL",
                    tenngnhan: "-TOÀN TRƯỜNG-"
                });
            }
        });

        if (dsNviec.length === 0) {
            gvTbaoNhanh('cbh', "Không có dòng nhiệm vụ nào để cập nhật!");
            return;
        }

        gvDatTai(true, "⏳ Đang đồng bộ nhiệm vụ chung...");
        khachApi.gvXulyNviec({ nam: nm, thang: th_htai, nviec: { batch: true, ds: dsNviec } }, function(kq) {
            gvDatTai(false);
            if (kq && kq.ttai === 'tcong') {
                gvTbaoNhanh('tcong', "Đã cập nhật nhiệm vụ chung thành công!");
                setTimeout(() => gvLaydlGoc(), 1000);
            } else {
                gvTbaoNhanh('loi', "Lỗi Server: " + (kq ? kq.tbao : "Unknown"));
            }
        }, function(l) {
            gvDatTai(false);
            gvTbaoNhanh('loi', "Lỗi kết nối: " + l.message);
        });
    }
